name: ohif/deploy-v3-upstream

on:
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    container:
      image: node:20

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
      
      - name: Clone and install OHIF dependencies
        run: |
          git clone https://github.com/OHIF/Viewers.git
          cd Viewers
          yarn install --frozen-lockfile

      - name: Build OHIF
        run: |
          cd Viewers
          wget -O ./firebase.json "${{ vars.OHIF_FIREBASE_JSON_URL }}"
          wget -O ./platform/app/public/config/test.js "${{ vars.OHIF_CONFIG_JS_URL }}"
          # Upstream has bun.lock; `yarn build` -> lerna/nx runs scripts via `bun` (not in this image).
          # Only @ohif/app defines build:viewer — invoke it with yarn directly.
          PUBLIC_URL=/ APP_CONFIG=config/test.js yarn --cwd platform/app run build:viewer

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          expires: 5d
          projectId: "${{ vars.FIREBASE_PROJECT_ID }}"
          entryPoint: ./Viewers
          channelId: live 
          # channelId: # 'pr-${{ github.event.number }}-${{ github.event.pull_request.head.ref }}'